<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <title>AfyaAI — Voice Health Assistant</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    :root{--green:#16a34a;--green2:#4ade80;--red:#ef4444;--bg:#0d1117;--card:#161b22;--border:#30363d;--text:#e6edf3;--muted:#8b949e;--muted2:#484f58}
    html,body{height:100%;overflow:hidden}
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column;height:100dvh}

    header{display:flex;align-items:center;gap:10px;padding:12px 16px;background:var(--card);border-bottom:1px solid var(--border);flex-shrink:0}
    .logo{width:36px;height:36px;border-radius:10px;flex-shrink:0;background:linear-gradient(135deg,var(--green),var(--green2));display:flex;align-items:center;justify-content:center;font-size:18px}
    header h1{font-size:17px;font-weight:700;line-height:1.1}
    header p{font-size:11px;color:var(--muted);margin-top:1px}
    .pill{margin-left:auto;display:flex;align-items:center;gap:6px;padding:4px 10px;border-radius:999px;border:1px solid var(--border);font-size:11px;color:var(--muted);flex-shrink:0}
    .dot{width:7px;height:7px;border-radius:50%;background:var(--muted2)}
    .dot.ready{background:var(--green);box-shadow:0 0 0 2px rgba(22,163,74,.25)}
    .dot.rec{background:var(--red);box-shadow:0 0 0 2px rgba(239,68,68,.25)}

    main{flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:16px;padding:20px}
    .card{width:min(520px,92vw);background:var(--card);border:1px solid var(--border);border-radius:16px;padding:18px}
    .hint{color:var(--muted);font-size:13px;line-height:1.55}

    .row{display:flex;gap:10px;align-items:center;justify-content:space-between;margin-top:14px}
    select{flex:1;background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:10px;padding:10px 12px;font-size:13px;outline:none}

    .mic{
      width:86px;height:86px;border-radius:50%;border:none;cursor:pointer;
      background:var(--green);color:#fff;font-size:28px;
      display:flex;align-items:center;justify-content:center;
      transition:transform .1s,background .2s;box-shadow:0 10px 30px rgba(22,163,74,.28);
    }
    .mic:active{transform:scale(.94)}
    .mic.on{background:var(--red);box-shadow:0 0 0 0 rgba(239,68,68,.5);animation:rip 1s infinite}
    @keyframes rip{0%{box-shadow:0 0 0 0 rgba(239,68,68,.45)}100%{box-shadow:0 0 0 18px rgba(239,68,68,0)}}

    .status{font-size:12px;color:var(--muted);text-align:center;margin-top:6px;min-height:18px}

    audio{width:min(520px,92vw)}

    footer{padding:10px 14px;text-align:center;color:var(--muted2);font-size:10px;border-top:1px solid var(--border);background:var(--card)}

    .toast{position:fixed;left:50%;transform:translateX(-50%);bottom:110px;background:#0b1220;border:1px solid var(--border);color:var(--text);padding:10px 14px;border-radius:12px;font-size:12px;display:none;max-width:92vw}
  </style>
</head>
<body>
<header>
  <div class="logo">🏥</div>
  <div>
    <h1>AfyaAI</h1>
    <p>Voice → Voice health triage</p>
  </div>
  <div class="pill"><div class="dot ready" id="dot"></div><span id="stxt">Ready</span><span id="langBadge" style="margin-left:6px;color:var(--muted2)"></span></div>
</header>

<main>
  <div class="card" style="text-align:center">
    <div class="hint" style="margin-bottom:14px">
      <b>Hold to talk.</b> Release to send. AfyaAI replies with voice.
      <br/>Tip: use earphones for the best experience.
    </div>

    <div id="orbWrap" style="display:flex;justify-content:center;margin:10px 0 14px">
      <div id="orb" style="width:140px;height:140px;border-radius:999px;background:radial-gradient(circle at 30% 30%, var(--green2), var(--green));box-shadow:0 0 0 0 rgba(74,222,128,.25);display:flex;align-items:center;justify-content:center;font-size:40px">
        🩺
      </div>
    </div>

    <div class="row">
      <select id="lang">
        <option value="">Auto-detect language</option>
        <option value="pcm">Nigerian Pidgin</option>
        <option value="en">English</option>
        <option value="yo">Yorùbá</option>
        <option value="ha">Hausa</option>
        <option value="ig">Igbo</option>
        <option value="sw">Swahili</option>
        <option value="fr">Français</option>
      </select>
      <button class="mic" id="mic">🎤</button>
    </div>

    <div class="status" id="status">Hold to talk</div>
    <div class="status" id="aiAnim" style="display:none">
      <span style="display:inline-flex;gap:4px;align-items:center;justify-content:center">
        <span style="width:6px;height:6px;border-radius:999px;background:var(--green);opacity:.6;animation:dot 1.2s infinite"></span>
        <span style="width:6px;height:6px;border-radius:999px;background:var(--green);opacity:.6;animation:dot 1.2s .2s infinite"></span>
        <span style="width:6px;height:6px;border-radius:999px;background:var(--green);opacity:.6;animation:dot 1.2s .4s infinite"></span>
        <span style="margin-left:6px;color:var(--muted)">AfyaAI responding…</span>
      </span>
    </div>
    <div class="status" id="sub" style="min-height:20px"></div>
  </div>

  <audio id="player" controls></audio>
</main>

<style>@keyframes dot{0%,100%{transform:translateY(0);opacity:.4}50%{transform:translateY(-4px);opacity:1}}</style>

<div class="toast" id="toast"></div>

<footer>⚕️ AI assistant only — not a substitute for professional medical care · stable voice-to-voice</footer>

<script>
const mic = document.getElementById('mic');
const statusEl = document.getElementById('status');
const player = document.getElementById('player');
const dot = document.getElementById('dot');
const stxt = document.getElementById('stxt');
const lang = document.getElementById('lang');
const toast = document.getElementById('toast');
const aiAnim = document.getElementById('aiAnim');
const langBadge = document.getElementById('langBadge');
const orb = document.getElementById('orb');
const sub = document.getElementById('sub');

// lightweight localStorage context
const HISTORY_KEY = 'afya_voice_history_v1';
function loadHistory(){
  try { return JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]') || []; } catch { return []; }
}
function saveHistory(h){
  try { localStorage.setItem(HISTORY_KEY, JSON.stringify(h.slice(-12))); } catch {}
}


let recorder=null, chunks=[], stream=null;
let holding=false;

function setTop(state, text){
  stxt.textContent = text;
  dot.className = 'dot ' + (state==='rec' ? 'rec' : 'ready');
}

function setStatus(t){ statusEl.textContent = t; }

function showToast(t){
  toast.textContent=t;
  toast.style.display='block';
  clearTimeout(window.__toastT);
  window.__toastT=setTimeout(()=>toast.style.display='none', 2600);
}

async function startRec(){
  if(holding) return;
  holding=true;
  setTop('rec','Recording');
  setStatus('Listening… release to send');
  mic.classList.add('on');
  mic.textContent='🔴';
  sub.textContent='';
  // orb pulse
  orb.style.animation = 'rip 1s infinite';

  stream = await navigator.mediaDevices.getUserMedia({ audio:true, video:false });
  const mime = MediaRecorder.isTypeSupported('audio/webm;codecs=opus') ? 'audio/webm;codecs=opus' : 'audio/webm';
  recorder = new MediaRecorder(stream, { mimeType: mime });
  chunks=[];
  recorder.ondataavailable = (e)=>{ if(e.data && e.data.size>0) chunks.push(e.data); };
  recorder.start();
}

async function stopRec(){
  if(!holding) return;
  holding=false;
  mic.classList.remove('on');
  mic.textContent='🎤';
  orb.style.animation = 'none';
  setTop('ready','Processing');
  setStatus('Processing…');
  aiAnim.style.display='block';

  const rec = recorder;
  recorder=null;
  if(rec && rec.state !== 'inactive') rec.stop();

  await new Promise(r=> setTimeout(r, 200));

  if(stream){ stream.getTracks().forEach(t=>t.stop()); stream=null; }

  const blob = new Blob(chunks, { type: rec?.mimeType || 'audio/webm' });
  chunks=[];

  if(blob.size < 4000){
    setTop('ready','Ready');
    setStatus('Hold to talk');
    showToast('Didn\'t catch that — hold mic a bit longer');
    return;
  }

  const b64 = await blobToBase64(blob);

  aiAnim.style.display='block';

  const history = loadHistory();
  const resp = await fetch('/api/voice', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ audio_b64: b64, mime_type: blob.type, lang_hint: lang.value, history })
  });

  const data = await resp.json();
  aiAnim.style.display='none';
  if(data.error){
    aiAnim.style.display='none';
    setTop('ready','Error');
    setStatus('Error: ' + data.error);
    showToast('Error: ' + data.error);
    return;
  }

  if(data.detected_language){
    langBadge.textContent = `· ${data.detected_language}`;
  }

  // save context using REAL transcript
  const history2 = loadHistory();
  if(data.transcript){
    history2.push({ role:'user', text: data.transcript });
    sub.textContent = data.transcript;
  } else {
    history2.push({ role:'user', text:'(voice message)' });
  }
  history2.push({ role:'assistant', text: data.reply_text || '' });
  saveHistory(history2);

  // show subtitles for assistant
  if(data.reply_text){
    sub.textContent = data.reply_text;
  }

  if(data.reply_audio_b64){
    setTop('ready','Speaking');
    setStatus('AfyaAI speaking…');
    orb.style.transform = 'scale(1.03)';
    const wav = pcmB64ToWavUrl(data.reply_audio_b64, data.reply_mime_type || 'audio/pcm;rate=24000');
    player.src = wav;
    await player.play().catch(()=>{});
    player.onended = () => { orb.style.transform='scale(1)'; };
  } else {
    setStatus('No voice returned (TTS missing)');
  }

  setTop('ready','Ready');
  setStatus('Hold to talk');
}

function blobToBase64(blob){
  return new Promise((resolve,reject)=>{
    const r=new FileReader();
    r.onload=()=>resolve(String(r.result).split(',')[1]);
    r.onerror=reject;
    r.readAsDataURL(blob);
  });
}

// Convert PCM base64 -> WAV blob URL for playback
function pcmB64ToWavUrl(pcmB64, mime){
  const rate = mime.includes('16000') ? 16000 : 24000;
  const pcmBytes = base64ToBytes(pcmB64);
  const wavBytes = pcmToWav(pcmBytes, rate);
  const blob = new Blob([wavBytes], { type: 'audio/wav' });
  return URL.createObjectURL(blob);
}

function base64ToBytes(b64){
  const bin = atob(b64);
  const bytes = new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) bytes[i]=bin.charCodeAt(i);
  return bytes;
}

function pcmToWav(pcmBytes, sampleRate){
  const numChannels=1;
  const bitsPerSample=16;
  const byteRate = sampleRate*numChannels*bitsPerSample/8;
  const blockAlign = numChannels*bitsPerSample/8;
  const dataSize = pcmBytes.length;
  const buffer = new ArrayBuffer(44 + dataSize);
  const view = new DataView(buffer);

  // RIFF header
  writeStr(view, 0, 'RIFF');
  view.setUint32(4, 36 + dataSize, true);
  writeStr(view, 8, 'WAVE');

  // fmt chunk
  writeStr(view, 12, 'fmt ');
  view.setUint32(16, 16, true);
  view.setUint16(20, 1, true); // PCM
  view.setUint16(22, numChannels, true);
  view.setUint32(24, sampleRate, true);
  view.setUint32(28, byteRate, true);
  view.setUint16(32, blockAlign, true);
  view.setUint16(34, bitsPerSample, true);

  // data chunk
  writeStr(view, 36, 'data');
  view.setUint32(40, dataSize, true);

  // PCM data
  new Uint8Array(buffer, 44).set(pcmBytes);
  return buffer;
}

function writeStr(view, offset, str){
  for(let i=0;i<str.length;i++) view.setUint8(offset+i, str.charCodeAt(i));
}

mic.addEventListener('mousedown', startRec);
mic.addEventListener('mouseup', stopRec);
mic.addEventListener('mouseleave', stopRec);
mic.addEventListener('touchstart', (e)=>{ e.preventDefault(); startRec(); }, {passive:false});
mic.addEventListener('touchend', (e)=>{ e.preventDefault(); stopRec(); }, {passive:false});

// iOS: prevent accidental scroll
mic.addEventListener('touchmove', (e)=>{ e.preventDefault(); }, {passive:false});

</script>
</body>
</html>
