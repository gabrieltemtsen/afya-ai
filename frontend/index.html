<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AfyaAI — Your Health Assistant</title>
  <style>
    :root {
      --green: #16a34a;
      --green-light: #dcfce7;
      --green-dark: #14532d;
      --red: #dc2626;
      --amber: #d97706;
      --gray-950: #0a0a0a;
      --gray-900: #111827;
      --gray-800: #1f2937;
      --gray-700: #374151;
      --gray-500: #6b7280;
      --gray-400: #9ca3af;
      --gray-300: #d1d5db;
      --gray-100: #f3f4f6;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--gray-950);
      color: white;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      background: var(--gray-900);
      border-bottom: 1px solid var(--gray-800);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo {
      width: 38px; height: 38px;
      background: linear-gradient(135deg, var(--green), #4ade80);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }

    header h1 { font-size: 18px; font-weight: 700; }
    header p { font-size: 12px; color: var(--gray-400); }

    .status-dot {
      margin-left: auto;
      display: flex; align-items: center; gap-6px; gap: 6px;
      font-size: 12px; color: var(--gray-400);
    }

    .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--gray-700);
      transition: background 0.3s;
    }
    .dot.ready { background: var(--green); box-shadow: 0 0 6px var(--green); animation: pulse 2s infinite; }
    .dot.listening { background: #60a5fa; box-shadow: 0 0 6px #60a5fa; }
    .dot.speaking { background: #a78bfa; box-shadow: 0 0 6px #a78bfa; }
    .dot.error { background: var(--red); }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    /* ── Chat transcript ── */
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .msg {
      max-width: 82%;
      padding: 10px 14px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.5;
      animation: fadeUp 0.2s ease;
    }

    @keyframes fadeUp { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:none; } }

    .msg.assistant {
      background: var(--gray-800);
      border: 1px solid var(--gray-700);
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }

    .msg.user {
      background: var(--green);
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }

    .msg.system {
      align-self: center;
      background: transparent;
      border: 1px solid var(--gray-700);
      color: var(--gray-400);
      font-size: 12px;
      border-radius: 999px;
      padding: 6px 14px;
    }

    .msg.error-msg {
      background: #450a0a;
      border: 1px solid var(--red);
      color: #fca5a5;
      align-self: center;
      font-size: 13px;
    }

    .img-preview {
      max-width: 200px;
      border-radius: 12px;
      margin-top: 6px;
      display: block;
    }

    /* ── Triage badge ── */
    .triage {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 3px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
      margin-top: 6px;
    }
    .triage.mild { background: #14532d; color: #86efac; }
    .triage.moderate { background: #451a03; color: #fcd34d; }
    .triage.severe { background: #450a0a; color: #fca5a5; }

    /* ── Waveform visualizer ── */
    #visualizer {
      height: 50px;
      background: var(--gray-900);
      border-top: 1px solid var(--gray-800);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 3px;
      padding: 0 20px;
    }

    .bar {
      width: 3px;
      height: 4px;
      background: var(--green);
      border-radius: 2px;
      transition: height 0.05s;
    }

    /* ── Controls ── */
    #controls {
      background: var(--gray-900);
      border-top: 1px solid var(--gray-800);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
    }

    .btn {
      border: none;
      cursor: pointer;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      transition: transform 0.1s, background 0.2s;
      user-select: none;
      -webkit-user-select: none;
    }

    .btn:active { transform: scale(0.93); }

    #mic-btn {
      width: 68px; height: 68px;
      background: var(--green);
      box-shadow: 0 0 0 0 rgba(22,163,74,0.4);
      transition: box-shadow 0.2s, background 0.2s;
    }

    #mic-btn.listening {
      background: var(--red);
      box-shadow: 0 0 0 10px rgba(220,38,38,0.2);
      animation: ripple 1s infinite;
    }

    @keyframes ripple {
      0% { box-shadow: 0 0 0 0 rgba(220,38,38,0.4); }
      100% { box-shadow: 0 0 0 16px rgba(220,38,38,0); }
    }

    #camera-btn {
      width: 48px; height: 48px;
      background: var(--gray-800);
      border: 1px solid var(--gray-700);
    }

    #camera-btn:hover { background: var(--gray-700); }

    #lang-select {
      background: var(--gray-800);
      border: 1px solid var(--gray-700);
      color: white;
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 13px;
      cursor: pointer;
      outline: none;
    }

    /* ── Disclaimer ── */
    #disclaimer {
      text-align: center;
      font-size: 11px;
      color: var(--gray-500);
      padding: 8px 16px;
      background: var(--gray-900);
    }

    /* Hidden file input */
    #file-input { display: none; }

    /* Scrollbar */
    #chat::-webkit-scrollbar { width: 4px; }
    #chat::-webkit-scrollbar-track { background: transparent; }
    #chat::-webkit-scrollbar-thumb { background: var(--gray-700); border-radius: 2px; }

    /* ── Intro card ── */
    #intro {
      align-self: center;
      max-width: 300px;
      text-align: center;
      padding: 32px 20px;
    }
    #intro .icon { font-size: 48px; margin-bottom: 16px; }
    #intro h2 { font-size: 18px; margin-bottom: 8px; }
    #intro p { font-size: 13px; color: var(--gray-400); line-height: 1.6; }
    .lang-pill {
      display: inline-block;
      background: var(--gray-800);
      border: 1px solid var(--gray-700);
      padding: 3px 10px;
      border-radius: 999px;
      font-size: 11px;
      color: var(--gray-400);
      margin: 3px;
    }
  </style>
</head>
<body>

<!-- Header -->
<header>
  <div class="logo">🏥</div>
  <div>
    <h1>AfyaAI</h1>
    <p>Voice Health Assistant</p>
  </div>
  <div class="status-dot">
    <div class="dot" id="dot"></div>
    <span id="status-text">Connecting…</span>
  </div>
</header>

<!-- Chat -->
<div id="chat">
  <div id="intro">
    <div class="icon">🎙️</div>
    <h2>Talk to AfyaAI</h2>
    <p>Describe your symptoms in any language. Hold the mic button to speak.</p>
    <div style="margin-top:12px">
      <span class="lang-pill">English</span>
      <span class="lang-pill">Pidgin</span>
      <span class="lang-pill">Yorùbá</span>
      <span class="lang-pill">Hausa</span>
      <span class="lang-pill">Igbo</span>
      <span class="lang-pill">Swahili</span>
      <span class="lang-pill">Français</span>
    </div>
  </div>
</div>

<!-- Waveform -->
<div id="visualizer">
  <div id="bars"></div>
</div>

<!-- Controls -->
<div id="controls">
  <select id="lang-select" title="Language hint">
    <option value="">Auto-detect</option>
    <option value="en">English</option>
    <option value="pcm">Nigerian Pidgin</option>
    <option value="yo">Yorùbá</option>
    <option value="ha">Hausa</option>
    <option value="ig">Igbo</option>
    <option value="sw">Swahili</option>
    <option value="fr">Français</option>
  </select>

  <button id="mic-btn" class="btn" title="Hold to speak">🎤</button>
  <button id="camera-btn" class="btn" title="Send photo">📷</button>
</div>

<input type="file" id="file-input" accept="image/*" capture="environment" />

<div id="disclaimer">
  ⚠️ AfyaAI is an AI assistant — not a doctor. Always seek professional medical care for serious conditions.
</div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
const WS_URL = `${location.protocol === 'https:' ? 'wss' : 'ws'}://${location.host}/ws/voice`;

let ws = null;
let audioCtx = null;
let mediaStream = null;
let sourceNode = null;
let processorNode = null;
let isRecording = false;
let sessionReady = false;
let audioQueue = [];
let isPlayingAudio = false;

// ── DOM ────────────────────────────────────────────────────────────────────
const chat = document.getElementById('chat');
const dot = document.getElementById('dot');
const statusText = document.getElementById('status-text');
const micBtn = document.getElementById('mic-btn');
const cameraBtn = document.getElementById('camera-btn');
const fileInput = document.getElementById('file-input');
const barsContainer = document.getElementById('bars');
const intro = document.getElementById('intro');

// Build waveform bars
const NUM_BARS = 30;
const bars = [];
for (let i = 0; i < NUM_BARS; i++) {
  const b = document.createElement('div');
  b.className = 'bar';
  barsContainer.appendChild(b);
  bars.push(b);
}

function setStatus(state, text) {
  dot.className = 'dot ' + state;
  statusText.textContent = text;
}

function addMessage(role, text, imgSrc) {
  if (intro && intro.parentNode) intro.remove();

  const div = document.createElement('div');
  div.className = 'msg ' + role;

  if (text) {
    div.textContent = text;
    // Detect triage keywords and add badge
    const lower = text.toLowerCase();
    if (role === 'assistant') {
      if (/go to hospital|emergency|immediately|right away|call ambulance/i.test(text)) {
        const badge = document.createElement('div');
        badge.className = 'triage severe';
        badge.innerHTML = '🔴 Go to hospital NOW';
        div.appendChild(badge);
      } else if (/visit (a )?clinic|health centre|within 24|see a doctor/i.test(text)) {
        const badge = document.createElement('div');
        badge.className = 'triage moderate';
        badge.innerHTML = '🟡 Visit a clinic soon';
        div.appendChild(badge);
      } else if (/rest at home|drink water|home care|mild|should clear/i.test(text)) {
        const badge = document.createElement('div');
        badge.className = 'triage mild';
        badge.innerHTML = '🟢 Home care';
        div.appendChild(badge);
      }
    }
  }

  if (imgSrc) {
    const img = document.createElement('img');
    img.src = imgSrc;
    img.className = 'img-preview';
    div.appendChild(img);
  }

  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

function addSystemMsg(text) {
  const div = document.createElement('div');
  div.className = 'msg system';
  div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function addError(text) {
  const div = document.createElement('div');
  div.className = 'msg error-msg';
  div.textContent = '⚠️ ' + text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

// ── WebSocket ──────────────────────────────────────────────────────────────
function connect() {
  setStatus('', 'Connecting…');
  ws = new WebSocket(WS_URL);

  ws.onopen = () => {
    setStatus('', 'Starting session…');
  };

  ws.onmessage = (evt) => {
    const msg = JSON.parse(evt.data);

    if (msg.type === 'ready') {
      sessionReady = true;
      setStatus('ready', 'Ready');
      addSystemMsg('AfyaAI is ready. Hold the mic to speak.');

    } else if (msg.type === 'audio') {
      setStatus('speaking', 'Speaking…');
      const pcmBytes = base64ToBytes(msg.data);
      queueAudio(pcmBytes, msg.mime_type || 'audio/pcm;rate=24000');

    } else if (msg.type === 'transcript') {
      addMessage('assistant', msg.text);

    } else if (msg.type === 'turn_complete') {
      setStatus('ready', 'Ready');

    } else if (msg.type === 'error') {
      addError(msg.message);
      setStatus('error', 'Error');

    } else if (msg.type === 'pong') {
      // heartbeat ok
    }
  };

  ws.onclose = () => {
    sessionReady = false;
    setStatus('error', 'Disconnected — retrying…');
    setTimeout(connect, 3000);
  };

  ws.onerror = () => {
    setStatus('error', 'Connection error');
  };
}

// ── Audio recording ────────────────────────────────────────────────────────
async function startRecording() {
  if (isRecording) return;
  if (!sessionReady) { addSystemMsg('Still connecting — please wait'); return; }

  try {
    audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
    if (audioCtx.state === 'suspended') await audioCtx.resume();

    mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
    sourceNode = audioCtx.createMediaStreamSource(mediaStream);

    processorNode = audioCtx.createScriptProcessor(4096, 1, 1);
    processorNode.onaudioprocess = (e) => {
      if (!isRecording) return;
      const float32 = e.inputBuffer.getChannelData(0);
      const pcm16 = float32ToPcm16(float32);
      const b64 = bytesToBase64(pcm16);
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'audio', data: b64 }));
      }
      // Animate bars
      animateBars(float32);
    };

    sourceNode.connect(processorNode);
    processorNode.connect(audioCtx.destination);
    isRecording = true;
    micBtn.classList.add('listening');
    micBtn.textContent = '🔴';
    setStatus('listening', 'Listening…');

  } catch (err) {
    addError('Microphone access denied: ' + err.message);
  }
}

function stopRecording() {
  if (!isRecording) return;
  isRecording = false;
  micBtn.classList.remove('listening');
  micBtn.textContent = '🎤';

  if (processorNode) { processorNode.disconnect(); processorNode = null; }
  if (sourceNode) { sourceNode.disconnect(); sourceNode = null; }
  if (mediaStream) { mediaStream.getTracks().forEach(t => t.stop()); mediaStream = null; }

  resetBars();
  setStatus('ready', 'Processing…');

  // Signal end of turn
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ type: 'end_of_turn' }));
  }
}

// ── Audio playback ─────────────────────────────────────────────────────────
function queueAudio(pcmBytes, mimeType) {
  audioQueue.push({ pcmBytes, mimeType });
  if (!isPlayingAudio) playNext();
}

async function playNext() {
  if (!audioQueue.length) { isPlayingAudio = false; return; }
  isPlayingAudio = true;

  const { pcmBytes, mimeType } = audioQueue.shift();
  const sampleRate = mimeType.includes('24000') ? 24000 : 16000;

  try {
    const ctx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
    const numSamples = pcmBytes.length / 2;
    const buffer = ctx.createBuffer(1, numSamples, sampleRate);
    const channelData = buffer.getChannelData(0);

    const dv = new DataView(pcmBytes.buffer, pcmBytes.byteOffset, pcmBytes.byteLength);
    for (let i = 0; i < numSamples; i++) {
      channelData[i] = dv.getInt16(i * 2, true) / 32768;
    }

    const src = ctx.createBufferSource();
    src.buffer = buffer;
    src.connect(ctx.destination);
    src.onended = () => playNext();
    src.start();
  } catch (e) {
    console.error('Audio playback error', e);
    playNext();
  }
}

// ── Image upload ───────────────────────────────────────────────────────────
cameraBtn.addEventListener('click', () => fileInput.click());

fileInput.addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = () => {
    const dataUrl = reader.result;
    const b64 = dataUrl.split(',')[1];
    const mime = file.type || 'image/jpeg';

    // Show preview in chat
    addMessage('user', '📷 Sent a photo', dataUrl);

    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({
        type: 'image',
        data: b64,
        mime_type: mime,
        caption: 'I have sent you a photo. Please look at it and tell me what you see and if it is concerning.'
      }));
    }
  };
  reader.readAsDataURL(file);
  fileInput.value = '';
});

// ── Mic button (hold to talk) ──────────────────────────────────────────────
micBtn.addEventListener('mousedown', startRecording);
micBtn.addEventListener('mouseup', stopRecording);
micBtn.addEventListener('mouseleave', stopRecording);

micBtn.addEventListener('touchstart', (e) => { e.preventDefault(); startRecording(); }, { passive: false });
micBtn.addEventListener('touchend', (e) => { e.preventDefault(); stopRecording(); }, { passive: false });

// ── Utility ────────────────────────────────────────────────────────────────
function float32ToPcm16(float32) {
  const buf = new Int16Array(float32.length);
  for (let i = 0; i < float32.length; i++) {
    buf[i] = Math.max(-32768, Math.min(32767, Math.round(float32[i] * 32767)));
  }
  return new Uint8Array(buf.buffer);
}

function base64ToBytes(b64) {
  const bin = atob(b64);
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  return bytes;
}

function bytesToBase64(bytes) {
  let bin = '';
  for (let i = 0; i < bytes.length; i++) bin += String.fromCharCode(bytes[i]);
  return btoa(bin);
}

function animateBars(samples) {
  const step = Math.floor(samples.length / NUM_BARS);
  for (let i = 0; i < NUM_BARS; i++) {
    const v = Math.abs(samples[i * step] || 0);
    bars[i].style.height = `${4 + v * 44}px`;
  }
}

function resetBars() {
  bars.forEach(b => b.style.height = '4px');
}

// ── Ping keepalive ─────────────────────────────────────────────────────────
setInterval(() => {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ type: 'ping' }));
  }
}, 20000);

// ── Boot ───────────────────────────────────────────────────────────────────
connect();
</script>
</body>
</html>
